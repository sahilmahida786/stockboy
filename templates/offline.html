<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Stockboy Premium</title>
  <style>
    body {
      margin: 0; padding: 0;
      background: #08090D;
      color: #fff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .sb-off-wrap {
      padding: 2rem;
      max-width: 400px;
    }
    .sb-off-icon {
      width: 80px; height: 80px;
      margin: 0 auto 1.5rem;
      background: rgba(255,82,82,0.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #FF5252;
    }
    .sb-off-icon svg { width: 40px; height: 40px; }
    .sb-off-title {
      font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em;
    }
    .sb-off-desc {
      font-size: 0.95rem; color: #8a9bb0; line-height: 1.6; margin-bottom: 2rem;
    }
    .sb-btn-retry {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #FFD54A, #FFB300);
      color: #0B1220; font-weight: 700; font-size: 1rem;
      border-radius: 0.75rem; text-decoration: none; border: none; cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,213,74,0.2);
    }
    .sb-off-sync {
      margin-top: 1.5rem; font-size: 0.75rem; color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="sb-off-wrap">
    <div class="sb-off-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M17.31 17.31A10.43 10.43 0 0 1 12 19c-7 0-10-7-10-7a13.23 13.23 0 0 1 2.36-3.32"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
    </div>
    <h1 class="sb-off-title">No Internet Connection</h1>
    <p class="sb-off-desc">It looks like you're offline. Please check your network connection to access live market signals.</p>
    <button class="sb-btn-retry" onclick="window.location.reload()">
      Try Reconnecting
    </button>
    <div class="sb-off-sync" id="sbSyncTime"></div>
  </div>
  <script>
    document.getElementById('sbSyncTime').textContent = 'Last synced: ' + new Date().toLocaleTimeString();
  </script>
</body>
</html>
