<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ 'Edit' if mode == 'edit' else 'Create' }} Premium Signal – Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b; --card: #18181b; --card-hover: #27272a;
    --text: #f8fafc; --muted: #94a3b8; --border: #334155;
    --primary: #3b82f6; --primary-hover: #2563eb;
    --buy: #22c55e; --sell: #ef4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
  body { background:var(--bg); color:var(--text); min-height:100vh; display:flex; justify-content:center; padding:3rem 1rem; }
  .container { background:var(--card); width:100%; max-width:600px; padding:2rem; border-radius:1rem; border:1px solid var(--border); box-shadow:0 25px 50px -12px rgba(0,0,0,0.5); }
  h1 { font-size:1.5rem; margin-bottom:1.5rem; text-align:center; font-weight:600; }
  
  .form-group { margin-bottom:1.25rem; }
  label { display:block; font-size:0.875rem; color:var(--muted); margin-bottom:0.5rem; font-weight:500; }
  input[type="text"], input[type="number"], select {
    width:100%; padding:0.75rem 1rem; background:var(--bg); border:1px solid var(--border);
    border-radius:0.5rem; color:var(--text); font-size:1rem; outline:none; transition:border-color 0.2s;
  }
  input:focus, select:focus { border-color:var(--primary); }
  
  .radio-group { display:flex; gap:1rem; }
  .radio-card { flex:1; }
  .radio-card input { display:none; }
  .radio-card label {
    display:flex; justify-content:center; align-items:center; padding:0.75rem; 
    border:1px solid var(--border); border-radius:0.5rem; cursor:pointer;
    background:var(--bg); color:var(--text); font-weight:600; transition:all 0.2s; margin:0;
  }
  .radio-card input:checked + label { border-color:var(--primary); background:rgba(59,130,246,0.1); color:var(--primary); }
  .radio-card.buy input:checked + label { border-color:var(--buy); background:rgba(34,197,94,0.1); color:var(--buy); }
  .radio-card.sell input:checked + label { border-color:var(--sell); background:rgba(239,68,68,0.1); color:var(--sell); }

  .row { display:flex; gap:1rem; }
  .row .form-group { flex:1; }

  button { 
    width:100%; padding:1rem; background:var(--primary); color:white; border:none; 
    border-radius:0.5rem; font-size:1rem; font-weight:600; cursor:pointer; transition:background 0.2s; margin-top:1rem;
  }
  button:hover { background:var(--primary-hover); }
  .back { display:block; text-align:center; margin-top:1.5rem; color:var(--muted); text-decoration:none; font-size:0.875rem; }
  .back:hover { color:var(--text); }
</style>
</head>
<body>

<div class="container">
  <h1>{{ 'Edit' if mode == 'edit' else 'Create' }} Premium Signal</h1>
  <form method="POST">
    
    <div class="form-group">
      <label>Category</label>
      <div class="radio-group">
        <div class="radio-card">
          <input type="radio" name="category" id="cat_intraday" value="Intraday" {% if not signal or signal.category == 'Intraday' %}checked{% endif %}>
          <label for="cat_intraday">Intraday</label>
        </div>
        <div class="radio-card">
          <input type="radio" name="category" id="cat_fno" value="F&O" {% if signal and signal.category == 'F&O' %}checked{% endif %}>
          <label for="cat_fno">F&O</label>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Stock Name (e.g. RELIANCE)</label>
      <input type="text" name="stockName" value="{{ signal.stockName if signal else '' }}" required placeholder="Stock Name">
    </div>

    <div class="form-group">
      <label>Recommendation</label>
      <div class="radio-group">
        <div class="radio-card buy">
          <input type="radio" name="recommendation" id="rec_buy" value="BUY" {% if not signal or signal.recommendation == 'BUY' %}checked{% endif %}>
          <label for="rec_buy">BUY</label>
        </div>
        <div class="radio-card sell">
          <input type="radio" name="recommendation" id="rec_sell" value="SELL" {% if signal and signal.recommendation == 'SELL' %}checked{% endif %}>
          <label for="rec_sell">SELL</label>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label>Current Price (₹)</label>
        <input type="number" step="0.01" name="currentPrice" value="{{ signal.currentPrice if signal else '' }}" required placeholder="e.g. 1524.30">
      </div>
      <div class="form-group">
        <label>Target Price (₹)</label>
        <input type="number" step="0.01" name="targetPrice" value="{{ signal.targetPrice if signal else '' }}" required placeholder="e.g. 1548.00">
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label>Duration</label>
        <select name="duration">
          <option value="Intraday" {% if signal and signal.duration == 'Intraday' %}selected{% endif %}>Intraday</option>
          <option value="24 Hours" {% if signal and signal.duration == '24 Hours' %}selected{% endif %}>24 Hours</option>
          <option value="2 Days" {% if signal and signal.duration == '2 Days' %}selected{% endif %}>2 Days</option>
          <option value="3 Days" {% if signal and signal.duration == '3 Days' %}selected{% endif %}>3 Days</option>
          <option value="1 Week" {% if signal and signal.duration == '1 Week' %}selected{% endif %}>1 Week</option>
        </select>
      </div>
      <div class="form-group">
        <label>Confidence</label>
        <select name="confidence">
          <option value="High" {% if signal and signal.confidence == 'High' %}selected{% endif %}>High</option>
          <option value="Very High" {% if signal and signal.confidence == 'Very High' %}selected{% endif %}>Very High</option>
          <option value="Strong Buy" {% if signal and signal.confidence == 'Strong Buy' %}selected{% endif %}>Strong Buy</option>
          <option value="Strong Sell" {% if signal and signal.confidence == 'Strong Sell' %}selected{% endif %}>Strong Sell</option>
        </select>
      </div>
    </div>
    
    <div class="form-group">
      <label>Status</label>
      <select name="status">
        <option value="Active" {% if not signal or signal.status == 'Active' %}selected{% endif %}>Active</option>
        <option value="Closed" {% if signal and signal.status == 'Closed' %}selected{% endif %}>Closed</option>
        <option value="Target Hit" {% if signal and signal.status == 'Target Hit' %}selected{% endif %}>Target Hit</option>
        <option value="Cancelled" {% if signal and signal.status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
      </select>
    </div>

    <button type="submit">Publish Signal</button>
    <a href="/admin" class="back">← Back to Dashboard</a>
  </form>
</div>

</body>
</html>
